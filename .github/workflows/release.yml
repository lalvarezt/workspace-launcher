name: Release Assets

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to package and publish
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          git rev-parse "refs/tags/$tag" >/dev/null 2>&1 || {
            printf 'Tag %s does not exist\n' "$tag" >&2
            exit 1
          }

          git checkout --detach "refs/tags/$tag"

          version="$(cat VERSION)"
          if [[ "$tag" != "$version" ]]; then
            printf 'Tag %s does not match VERSION %s\n' "$tag" "$version" >&2
            exit 1
          fi

          printf 'tag=%s\n' "$tag" >> "$GITHUB_OUTPUT"

      - name: Build release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist dist/bin
          version="$(cat VERSION)"
          version_no_v="${version#v}"
          for target in linux_amd64 linux_arm64 darwin_amd64 darwin_arm64; do
            goos="${target%_*}"
            goarch="${target#*_}"
            stage_dir="dist/stage/$target"
            mkdir -p "$stage_dir"
            CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" go build \
              -ldflags "-X main.version=$version" \
              -o "$stage_dir/workspace-launcher" \
              ./cmd/workspace-launcher
            install -m 755 "$stage_dir/workspace-launcher" "dist/bin/workspace-launcher_${version_no_v}_${target}"
            ln -sf workspace-launcher "$stage_dir/wl"
            install -m 644 LICENSE "$stage_dir/LICENSE"
            install -m 644 README.md "$stage_dir/README.md"
            install -m 644 VERSION "$stage_dir/VERSION"
            tar -C "$stage_dir" -czf "dist/workspace-launcher_${version_no_v}_${target}.tar.gz" workspace-launcher wl LICENSE README.md VERSION
          done
          (
            cd dist
            find . -maxdepth 2 -type f ! -name checksums.txt -print | LC_ALL=C sort | xargs sha256sum
          ) > dist/checksums.txt
          rm -rf dist/stage

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          files: |
            dist/bin/*
            dist/*.tar.gz
            dist/checksums.txt
          fail_on_unmatched_files: true
          generate_release_notes: true
          overwrite_files: true
